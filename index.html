<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VRM 十字ビューア</title>
<style>
  :root{
    --accent:#5b9dff;
    --text:#eee;
    --muted:#8a8a90;
    --panel:#151517;
    --panel-line:#26262a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0a0a0c;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    height:100%;overflow:hidden;touch-action:manipulation;}
  #app{display:flex;flex-direction:column;height:100%;}

  header{
    padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--panel-line);
    display:flex;flex-wrap:wrap;align-items:center;gap:16px;
  }
  h1{font-size:14px;font-weight:600;margin:0 8px 0 0;color:#fff;letter-spacing:.02em;white-space:nowrap;}

  .file-btn{
    background:#232327;color:#fff;border:1px solid #333;
    padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;
  }
  .file-btn:hover{background:#2b2b30;}
  input[type=file]{display:none;}

  .toggle-wrap{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);white-space:nowrap;}
  .switch{
    position:relative;width:46px;height:26px;background:#2a2a2e;border-radius:999px;
    cursor:pointer;transition:background .2s;flex-shrink:0;
  }
  .switch.on{background:var(--accent);}
  .switch .knob{
    position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
    background:#fff;transition:left .18s;
  }
  .switch.on .knob{left:23px;}
  .label-active{color:#fff;font-weight:600;}

  select{
    background:#1c1c1f;color:#eee;border:1px solid #333;border-radius:6px;
    padding:6px 8px;font-size:13px;
  }

  #status{font-size:12px;color:var(--muted);margin-left:auto;text-align:right;}

  main{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;background:#000;padding:16px;position:relative;min-width:0;}
  #composite{background:#000;}
  #fullscreenBtn{
    position:absolute;top:12px;right:12px;z-index:5;
    width:40px;height:40px;border-radius:8px;
    background:rgba(255,255,255,0.08);border:1px solid #333;color:#eee;
    font-size:18px;line-height:1;cursor:pointer;
  }
  #fullscreenBtn:hover{background:rgba(255,255,255,0.16);}
  main:fullscreen{padding:0;}
  #placeholder{position:absolute;color:#4a4a4f;font-size:13px;text-align:center;line-height:1.7;pointer-events:none;}

  #viewerRow{flex:1;display:flex;flex-direction:row;min-height:0;}

  #motionPanel{
    width:240px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--panel-line);
    display:flex;flex-direction:column;overflow:hidden;
  }
  #motionControls{
    padding:12px;border-bottom:1px solid var(--panel-line);
    display:flex;flex-direction:column;gap:10px;font-size:12px;color:var(--muted);
  }
  .motion-playmode{display:flex;flex-direction:column;gap:6px;}
  .motion-playmode label{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text);}
  .motion-interval{display:flex;align-items:center;gap:8px;}
  .motion-interval input[type=number]{
    width:64px;background:#1c1c1f;color:#eee;border:1px solid #333;border-radius:6px;
    padding:6px 8px;font-size:13px;
  }
  #motionPlayPauseBtn{width:100%;}
  #motionList{
    list-style:none;margin:0;padding:6px;overflow-y:auto;flex:1;
    display:flex;flex-direction:column;gap:6px;
  }
  .motion-item{
    display:flex;align-items:center;gap:6px;background:#1c1c1f;border:1px solid #2a2a2e;
    border-radius:8px;padding:6px 8px;font-size:12px;
  }
  .motion-item.playing{border-color:var(--accent);background:#1a2433;}
  .motion-item .motion-name{
    flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);
  }
  .motion-item.playing .motion-name{color:#fff;font-weight:600;}
  .motion-item-actions{display:flex;gap:2px;flex-shrink:0;}
  .motion-item-actions button{
    background:#26262a;color:#eee;border:1px solid #333;border-radius:5px;
    width:22px;height:22px;font-size:11px;line-height:1;cursor:pointer;padding:0;
  }
  .motion-item-actions button:hover:not(:disabled){background:#303036;}
  .motion-item-actions button:disabled{opacity:.3;cursor:not-allowed;}
  #motionListEmpty{padding:16px 12px;font-size:12px;color:var(--muted);text-align:center;}

  footer{
    padding:10px 16px;background:var(--panel);border-top:1px solid var(--panel-line);
    display:flex;flex-direction:column;gap:8px;
  }
  .footer-row{display:flex;gap:10px;justify-content:flex-end;align-items:center;}
  button.action{
    background:#1c1c1f;color:#eee;border:1px solid #333;border-radius:8px;
    padding:8px 16px;font-size:13px;cursor:pointer;
  }
  button.action:hover:not(:disabled){background:#26262a;}
  button.action:disabled{opacity:.35;cursor:not-allowed;}
  #logToggle{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;margin-right:auto;}
  #logPanel{
    display:block;max-height:140px;overflow-y:auto;background:#000;border:1px solid var(--panel-line);
    border-radius:6px;padding:8px 10px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:11px;line-height:1.5;color:#9ad3ff;white-space:pre-wrap;word-break:break-all;
  }
  #logPanel .err{color:#ff8080;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>VRM 十字ビューア</h1>

    <label class="file-btn" for="vrmInput">VRMを開く</label>
    <input type="file" id="vrmInput" accept=".vrm" disabled>

    <label class="file-btn" for="vrmaInput">VRMAを開く</label>
    <input type="file" id="vrmaInput" accept=".vrma" multiple disabled>

    <div class="toggle-wrap">
      <span id="labelFeet" class="label-active">足を中心</span>
      <div class="switch" id="centerSwitch"><div class="knob"></div></div>
      <span id="labelHead">頭を中心</span>
    </div>

    <div class="toggle-wrap">
      <span>解像度</span>
      <select id="cellSize">
        <option value="300">300px</option>
        <option value="400" selected>400px</option>
        <option value="512">512px</option>
        <option value="640">640px</option>
      </select>
    </div>

    <span id="status">VRMファイルを選択してください</span>
  </header>

  <div id="viewerRow">
    <main>
      <button id="fullscreenBtn" title="全画面表示">⛶</button>
      <canvas id="composite" width="1200" height="1200" style="display:none;"></canvas>
      <div id="placeholder">VRMファイルを読み込むと<br>前後左右4方向の側面図を十字状に表示します</div>
    </main>

    <aside id="motionPanel">
      <div id="motionControls">
        <div class="motion-playmode">
          <label><input type="radio" name="playMode" value="loop" checked>🔁 順番にループ</label>
          <label><input type="radio" name="playMode" value="random">🔀 ランダム</label>
        </div>
        <div class="motion-interval">
          <label for="motionInterval">切替間隔(秒)</label>
          <input type="number" id="motionInterval" min="0.5" step="0.5" value="5">
        </div>
        <button class="action" id="motionPlayPauseBtn" disabled>▶ 再生</button>
      </div>
      <ul id="motionList"></ul>
      <div id="motionListEmpty">モーションが読み込まれていません</div>
    </aside>
  </div>

  <footer>
    <div id="logPanel"></div>
    <div class="footer-row">
      <button id="logToggle">診断ログを隠す</button>
      <button class="action" id="downloadBtn" disabled>PNGとして保存</button>
    </div>
  </footer>
</div>


<script>
// ---- 診断ログ(画面上に表示) ----
const logEntries = [];
function log(msg, isError) {
  const time = new Date().toLocaleTimeString('ja-JP');
  logEntries.push(`[${time}] ${isError ? '⚠ ' : ''}${msg}`);
  const logPanel = document.getElementById('logPanel');
  if (logPanel) {
    logPanel.innerHTML = logEntries
      .map(l => `<div class="${l.includes('⚠') ? 'err' : ''}">${l.replace(/</g, '&lt;')}</div>`)
      .join('');
    logPanel.scrollTop = logPanel.scrollHeight;
  }
  if (isError) console.error(msg); else console.log(msg);
}
log('このHTMLファイルの作成日時: 2026-07-06 11:35 JST');
window.addEventListener('error', (e) => {
  log('スクリプトエラー: ' + (e.message || e.error || e), true);
  const statusEl = document.getElementById('status');
  if (statusEl) statusEl.textContent = 'エラーが発生しました。診断ログを確認してください。';
});
window.addEventListener('unhandledrejection', (e) => {
  const reason = e.reason && e.reason.message ? e.reason.message : String(e.reason);
  log('未処理のPromiseエラー: ' + reason, true);
  const statusEl = document.getElementById('status');
  if (statusEl) statusEl.textContent = 'エラーが発生しました。診断ログを確認してください。';
});

// ページ全体のピンチズームを禁止(Safari/WebKit系のジェスチャーイベントを抑止)
['gesturestart', 'gesturechange', 'gestureend'].forEach((type) => {
  document.addEventListener(type, (e) => e.preventDefault());
});
// 2本指以上でのタッチ操作はモデル表示エリア(#composite)以外ではページ拡大に使われないようにする
document.addEventListener('touchmove', (e) => {
  if (e.touches && e.touches.length > 1 && e.target && e.target.id !== 'composite') {
    e.preventDefault();
  }
}, { passive: false });
</script>

<!--
  ES modules(importmap)でthree.js / GLTFLoader / three-vrm / three-vrm-animationを読み込む。
  VRMA(モーション)対応にはVRM0/VRM1両対応の新しいthree-vrm(v3系, ESM専用配布)が必要なため、
  以前使用していた0.6系classic UMDビルドから移行した。
  注意: importmapを用いたESMは file:// で直接開いた場合、ブラウザによっては
  CORS制限でブロックされることがある。http(s)経由(GitHub Pages等)で開くこと。
-->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.js",
    "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.js"
  }
}
</script>

<script type="module">
const statusEl = document.getElementById('status');
const logPanel = document.getElementById('logPanel');
const logToggle = document.getElementById('logToggle');

const vrmInput = document.getElementById('vrmInput');
const vrmaInput = document.getElementById('vrmaInput');
const compositeCanvas = document.getElementById('composite');
const compositeCtx = compositeCanvas.getContext('2d');
const placeholder = document.getElementById('placeholder');
const centerSwitch = document.getElementById('centerSwitch');
const labelFeet = document.getElementById('labelFeet');
const labelHead = document.getElementById('labelHead');
const cellSizeSelect = document.getElementById('cellSize');
const downloadBtn = document.getElementById('downloadBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const mainEl = document.querySelector('main');

const motionListEl = document.getElementById('motionList');
const motionListEmptyEl = document.getElementById('motionListEmpty');
const motionPlayPauseBtn = document.getElementById('motionPlayPauseBtn');
const motionIntervalInput = document.getElementById('motionInterval');
const playModeRadios = document.querySelectorAll('input[name="playMode"]');

function updateFullscreenBtn() {
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  fullscreenBtn.textContent = isFs ? '✕' : '⛶';
  fullscreenBtn.title = isFs ? '全画面を終了' : '全画面表示';
}
fullscreenBtn.addEventListener('click', () => {
  const isFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFs) {
    const req = mainEl.requestFullscreen || mainEl.webkitRequestFullscreen;
    if (req) {
      req.call(mainEl).catch((err) => log('全画面表示に失敗しました: ' + err.message, true));
    } else {
      log('この端末・ブラウザは全画面表示に対応していません', true);
    }
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document);
  }
});
document.addEventListener('fullscreenchange', updateFullscreenBtn);
document.addEventListener('webkitfullscreenchange', updateFullscreenBtn);

// ---- ピンチズーム(モデルを拡大表示して再レンダリング) ----
let viewZoom = 1; // 1 = 通常表示。大きいほどカメラが寄って再レンダリングされる
const ZOOM_MIN = 1, ZOOM_MAX = 6;
const activePointers = new Map();
let pinchStartDist = 0, pinchStartZoom = 1;
let lastTapTime = 0;
let renderPending = false;

function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(() => {
    renderPending = false;
    if (currentVrm) {
      renderAllViews();
      drawComposite();
    }
  });
}
function resetZoom() {
  if (viewZoom !== 1) {
    viewZoom = 1;
    scheduleRender();
  }
}

// ---- 十字の各画像の中心からの距離(上下スワイプで調整) ----
let armRatio = 1; // 1 = 標準(隣接)配置。負の値になると中心を越えて反対側へ近づく
const ARM_RATIO_MIN = -1;
const ARM_RATIO_MAX = 2.5;

// ---- 左右スワイプでモデルの体軸(Y軸)を基準に回転 ----
let rotationY = 0; // ラジアン。左右スワイプで加算され、全方向のレンダリングに反映される
const ROTATION_SENSITIVITY = Math.PI / 300; // 1pxあたりの回転量(300px≒180度)

let vDragStart = null; // { x, y, armRatio, rotationY, displayScale }

compositeCanvas.style.touchAction = 'none';

function pointFromEvent(e) {
  const rect = mainEl.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

compositeCanvas.addEventListener('pointerdown', (e) => {
  compositeCanvas.setPointerCapture(e.pointerId);
  activePointers.set(e.pointerId, pointFromEvent(e));

  if (activePointers.size === 2) {
    const pts = [...activePointers.values()];
    pinchStartDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1;
    pinchStartZoom = viewZoom;
    vDragStart = null;
  } else if (activePointers.size === 1) {
    const p = pointFromEvent(e);
    const rect = compositeCanvas.getBoundingClientRect();
    const displayScale = rect.width > 0 ? (compositeCanvas.width / rect.width) : 1;
    vDragStart = { x: p.x, y: p.y, armRatio, rotationY, displayScale };
  }
});

compositeCanvas.addEventListener('pointermove', (e) => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, pointFromEvent(e));

  if (activePointers.size === 2) {
    const pts = [...activePointers.values()];
    const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    const newZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, pinchStartZoom * (dist / pinchStartDist)));
    if (newZoom !== viewZoom) {
      viewZoom = newZoom;
      scheduleRender();
    }
  } else if (activePointers.size === 1 && vDragStart) {
    const p = [...activePointers.values()][0];
    const dx = (p.x - vDragStart.x) * vDragStart.displayScale;
    const dy = (p.y - vDragStart.y) * vDragStart.displayScale;

    // 左右にスワイプするとモデルの体軸(Y軸)を基準にカメラが回転し、再レンダリングされる
    const newRotationY = vDragStart.rotationY + dx * ROTATION_SENSITIVITY;
    const rotationChanged = newRotationY !== rotationY;
    if (rotationChanged) rotationY = newRotationY;

    // 上にスワイプ(dyが負)すると中心からの距離が増え、下にスワイプすると縮まる
    const newRatio = Math.min(
      ARM_RATIO_MAX,
      Math.max(ARM_RATIO_MIN, vDragStart.armRatio - dy / cellSize)
    );
    const ratioChanged = newRatio !== armRatio;
    if (ratioChanged) armRatio = newRatio;

    if (rotationChanged) {
      // カメラ回転は3D再レンダリングを伴うためrAFでスケジューリングする(drawCompositeも内部で実行される)
      scheduleRender();
    } else if (ratioChanged) {
      drawComposite();
    }
  }
});

function endPointer(e) {
  activePointers.delete(e.pointerId);
  if (activePointers.size === 1) {
    const p = [...activePointers.values()][0];
    const rect = compositeCanvas.getBoundingClientRect();
    const displayScale = rect.width > 0 ? (compositeCanvas.width / rect.width) : 1;
    vDragStart = { x: p.x, y: p.y, armRatio, rotationY, displayScale };
  } else if (activePointers.size === 0) {
    vDragStart = null;

    if (e.pointerType === 'touch') {
      const now = Date.now();
      if (now - lastTapTime < 300) resetZoom();
      lastTapTime = now;
    }
  }
}
compositeCanvas.addEventListener('pointerup', endPointer);
compositeCanvas.addEventListener('pointercancel', endPointer);
compositeCanvas.addEventListener('dblclick', resetZoom);

logToggle.addEventListener('click', () => {
  const showing = logPanel.style.display === 'block';
  logPanel.style.display = showing ? 'none' : 'block';
  logToggle.textContent = showing ? '診断ログを表示' : '診断ログを隠す';
});

let mode = 'feet'; // 'feet' | 'head'
let currentVrm = null;
let renderedViews = null; // { back, front, right, left } canvases
let cellSize = parseInt(cellSizeSelect.value, 10);

let renderer, scene, camera;
let librariesReady = false;

// ESMライブラリの実体(動的importで取得後にここへ格納する)
let THREE, GLTFLoader, VRMLoaderPlugin, VRMUtils, VRMAnimationLoaderPlugin, createVRMAnimationClip, VRMLookAtQuaternionProxy;

// ---- VRMAモーション再生ループ(汎用のレンダーループ本体) ----
let mixer = null;            // THREE.AnimationMixer
let animClock = null;
let animating = false;       // requestAnimationFrameによる毎フレーム再レンダリングが動作中か

// ---- モーションリスト(複数のVRMAを保持し、順番/ランダムで自動切替再生する) ----
let motionList = [];         // { id, name, vrmAnimation }[]
let motionIdCounter = 1;
let currentMotionId = null;  // 現在適用中のモーションのid
let motionPlayMode = 'loop'; // 'loop' | 'random'
let motionIntervalSeconds = 5;
let motionListPlaying = false; // リスト再生(自動切替)が有効か
let motionAdvanceTimer = null; // 次のモーションへ切り替えるsetTimeoutハンドル

async function loadLibraries() {
  try {
    THREE = await import('three');
    log('three.js を読み込みました');
  } catch (err) { log('three.js の読み込みに失敗しました: ' + (err && err.message), true); }

  try {
    ({ GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js'));
    log('GLTFLoader.js を読み込みました');
  } catch (err) { log('GLTFLoader.js の読み込みに失敗しました: ' + (err && err.message), true); }

  try {
    ({ VRMLoaderPlugin, VRMUtils } = await import('@pixiv/three-vrm'));
    log('three-vrm を読み込みました');
  } catch (err) { log('three-vrm の読み込みに失敗しました: ' + (err && err.message), true); }

  try {
    ({ VRMAnimationLoaderPlugin, createVRMAnimationClip, VRMLookAtQuaternionProxy } = await import('@pixiv/three-vrm-animation'));
    log('three-vrm-animation を読み込みました');
  } catch (err) { log('three-vrm-animation の読み込みに失敗しました: ' + (err && err.message), true); }
}

async function init() {
  await loadLibraries();

  if (!THREE || !GLTFLoader || !VRMLoaderPlugin || !VRMAnimationLoaderPlugin) {
    statusEl.textContent = 'ライブラリの読み込みに失敗しました(診断ログを確認してください)';
    log('致命的エラー: THREE / GLTFLoader / VRM / VRMAnimation のいずれかが読み込まれていません', true);
    return;
  }

  renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: true });
  renderer.setPixelRatio(1);
  renderer.setClearColor(0x000000, 0); // 背景を透過にする(黒は透過色として扱う)

  scene = new THREE.Scene();
  scene.background = null; // 背景を描画しない(透過)

  scene.add(new THREE.AmbientLight(0xffffff, 0.75));
  const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
  keyLight.position.set(1, 2, 3);
  scene.add(keyLight);
  const fillLight = new THREE.DirectionalLight(0xffffff, 0.35);
  fillLight.position.set(-1, 1.5, -2);
  scene.add(fillLight);

  camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.01, 100);

  librariesReady = true;
  statusEl.textContent = 'VRMファイルを選択してください';
  vrmInput.disabled = false;
  vrmaInput.disabled = false;
  log('初期化完了');

  autoLoadDefaultModel();
}

const DEFAULT_MODEL_URL = './AliciaSolid.vrm';
const DEFAULT_VRMA_URL = './VRMA_01.vrma';

async function autoLoadDefaultModel() {
  try {
    log(`デフォルトモデルを自動読み込み中: ${DEFAULT_MODEL_URL}`);
    const resp = await fetch(DEFAULT_MODEL_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const blob = await resp.blob();
    const file = new File([blob], 'AliciaSolid.vrm', { type: blob.type || 'application/octet-stream' });
    await loadVrm(file);
    await autoLoadDefaultVrma();
  } catch (err) {
    log(`デフォルトモデルの自動読み込みをスキップしました(${DEFAULT_MODEL_URL} が見つからないか読み込めません。手動でVRMを選択してください): ${err && err.message}`);
  }
}

async function autoLoadDefaultVrma() {
  try {
    log(`デフォルトモーションを自動読み込み中: ${DEFAULT_VRMA_URL}`);
    const resp = await fetch(DEFAULT_VRMA_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const blob = await resp.blob();
    const file = new File([blob], 'VRMA_01.vrma', { type: blob.type || 'application/octet-stream' });
    const ok = await addMotionFile(file);
    if (ok) startMotionPlayback();
  } catch (err) {
    log(`デフォルトモーションの自動読み込みをスキップしました(${DEFAULT_VRMA_URL} が見つからないか読み込めません。手動でVRMAを選択してください): ${err && err.message}`);
  }
}

function disposeObject3D(root) {
  root.traverse((obj) => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach((m) => {
        Object.keys(m).forEach((key) => {
          const val = m[key];
          if (val && val.isTexture) val.dispose();
        });
        m.dispose();
      });
    }
  });
}

// gltfローダー(VRM本体とVRMAモーションの両方をこれ一つで読み込める)
function createGLTFLoader() {
  const loader = new GLTFLoader();
  loader.register((parser) => new VRMLoaderPlugin(parser));
  loader.register((parser) => new VRMAnimationLoaderPlugin(parser));
  return loader;
}

function loadGLTF(url) {
  return new Promise((resolve, reject) => {
    createGLTFLoader().load(url, resolve, undefined, reject);
  });
}

// ---- レンダーループ(mixerとVRMを毎フレーム更新して4方向を再描画する汎用ループ) ----
function stopAnimationLoop() {
  animating = false;
}

function startAnimationLoop() {
  if (animating) return;
  animating = true;
  animClock = new THREE.Clock();
  animClock.start();
  requestAnimationFrame(animationTick);
}

function animationTick() {
  if (!animating) return;
  const delta = animClock.getDelta();
  if (mixer) mixer.update(delta);
  if (currentVrm) {
    currentVrm.update(delta);
    renderAllViews();
    drawComposite();
  }
  requestAnimationFrame(animationTick);
}

// ---- モーションリストのUI描画 ----
function renderMotionList() {
  motionListEl.innerHTML = '';
  motionListEmptyEl.style.display = motionList.length ? 'none' : 'block';

  motionList.forEach((entry, idx) => {
    const li = document.createElement('li');
    li.className = 'motion-item' + (entry.id === currentMotionId ? ' playing' : '');

    const name = document.createElement('span');
    name.className = 'motion-name';
    name.textContent = entry.name;
    name.title = entry.name;
    li.appendChild(name);

    const actions = document.createElement('div');
    actions.className = 'motion-item-actions';

    const upBtn = document.createElement('button');
    upBtn.textContent = '▲';
    upBtn.title = '上へ移動';
    upBtn.disabled = idx === 0;
    upBtn.addEventListener('click', () => moveMotion(idx, -1));

    const downBtn = document.createElement('button');
    downBtn.textContent = '▼';
    downBtn.title = '下へ移動';
    downBtn.disabled = idx === motionList.length - 1;
    downBtn.addEventListener('click', () => moveMotion(idx, 1));

    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.title = '削除';
    delBtn.addEventListener('click', () => removeMotion(entry.id));

    actions.appendChild(upBtn);
    actions.appendChild(downBtn);
    actions.appendChild(delBtn);
    li.appendChild(actions);

    motionListEl.appendChild(li);
  });

  motionPlayPauseBtn.disabled = motionList.length === 0;
}

function moveMotion(index, dir) {
  const newIndex = index + dir;
  if (newIndex < 0 || newIndex >= motionList.length) return;
  const [item] = motionList.splice(index, 1);
  motionList.splice(newIndex, 0, item);
  renderMotionList();
}

function removeMotion(id) {
  const idx = motionList.findIndex((m) => m.id === id);
  if (idx === -1) return;
  const wasCurrent = id === currentMotionId;
  motionList.splice(idx, 1);

  if (motionList.length === 0) {
    stopMotionPlayback();
    currentMotionId = null;
    if (mixer) { mixer.stopAllAction(); mixer = null; }
    renderMotionList();
    return;
  }

  if (wasCurrent && motionListPlaying) {
    playMotionAtIndex(Math.min(idx, motionList.length - 1));
  } else {
    if (wasCurrent) currentMotionId = null;
    renderMotionList();
  }
}

// ---- モーションリストの自動切替再生 ----
function currentMotionIndex() {
  return motionList.findIndex((m) => m.id === currentMotionId);
}

function pickNextIndex(fromIdx) {
  if (motionPlayMode === 'random') {
    if (motionList.length === 1) return 0;
    let idx;
    do { idx = Math.floor(Math.random() * motionList.length); } while (idx === fromIdx);
    return idx;
  }
  return (fromIdx + 1 + motionList.length) % motionList.length; // loop: 順番に次へ
}

function clearMotionAdvanceTimer() {
  if (motionAdvanceTimer) {
    clearTimeout(motionAdvanceTimer);
    motionAdvanceTimer = null;
  }
}

function scheduleNextAdvance() {
  clearMotionAdvanceTimer();
  if (!motionListPlaying || motionList.length < 2) return; // 1件だけならそのままループ再生
  const ms = Math.max(500, motionIntervalSeconds * 1000);
  motionAdvanceTimer = setTimeout(() => {
    const idx = currentMotionIndex();
    playMotionAtIndex(pickNextIndex(idx === -1 ? 0 : idx));
  }, ms);
}

function playMotionAtIndex(index) {
  const entry = motionList[index];
  if (!entry || !currentVrm) return;
  currentMotionId = entry.id;

  if (mixer) mixer.stopAllAction();
  const clip = createVRMAnimationClip(entry.vrmAnimation, currentVrm);
  mixer = new THREE.AnimationMixer(currentVrm.scene);
  mixer.clipAction(clip).play(); // AnimationActionは既定でLoopRepeat(無限)

  startAnimationLoop();
  renderMotionList();
  scheduleNextAdvance();
}

function startMotionPlayback() {
  if (!motionList.length || !currentVrm) return;
  motionListPlaying = true;
  motionPlayPauseBtn.textContent = '⏸ 一時停止';

  let idx = currentMotionIndex();
  if (idx === -1) {
    idx = motionPlayMode === 'random' ? Math.floor(Math.random() * motionList.length) : 0;
  }
  playMotionAtIndex(idx);
}

function stopMotionPlayback() {
  motionListPlaying = false;
  motionPlayPauseBtn.textContent = '▶ 再生';
  clearMotionAdvanceTimer();
  stopAnimationLoop(); // 現在のポーズのまま静止する
}

// ---- モーションファイルの読み込み ----
async function addMotionFile(file) {
  if (!librariesReady) {
    log('ライブラリの準備ができていないため読み込めません', true);
    return false;
  }
  if (!currentVrm) {
    log('先にVRMモデルを読み込んでください', true);
    statusEl.textContent = '先にVRMモデルを読み込んでください';
    return false;
  }

  const url = URL.createObjectURL(file);
  try {
    log(`VRMAファイル選択: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`);
    const gltf = await loadGLTF(url);
    const vrmAnimations = gltf.userData.vrmAnimations;
    if (!vrmAnimations || !vrmAnimations.length) {
      throw new Error('このファイルにVRMAモーションデータが見つかりませんでした');
    }
    motionList.push({ id: 'm' + (motionIdCounter++), name: file.name, vrmAnimation: vrmAnimations[0] });
    renderMotionList();
    log(`モーションをリストに追加しました: ${file.name}`);
    return true;
  } catch (err) {
    log('VRMA読み込みエラー: ' + (err && err.message ? err.message : err), true);
    return false;
  } finally {
    URL.revokeObjectURL(url);
  }
}

async function loadVrmaFiles(fileList) {
  statusEl.textContent = 'モーション読み込み中...';
  let successCount = 0;
  for (const file of fileList) {
    if (await addMotionFile(file)) successCount++;
  }
  statusEl.textContent = successCount > 0
    ? `モーションを${successCount}件リストに追加しました`
    : 'モーションの読み込みに失敗しました。診断ログを確認してください。';

  if (successCount > 0 && !motionListPlaying) startMotionPlayback();
}

async function loadVrm(file) {
  if (!librariesReady) {
    log('ライブラリの準備ができていないため読み込めません', true);
    return;
  }

  statusEl.textContent = '読み込み中...';
  downloadBtn.disabled = true;

  const url = URL.createObjectURL(file);

  try {
    log(`ファイル選択: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`);
    const gltf = await loadGLTF(url);
    const vrm = gltf.userData.vrm;
    if (!vrm) throw new Error('VRMデータが見つかりませんでした');

    // VRM0.0モデルは-Z向きなので、+Z向き(VRM1.0基準)に統一する(VRM1.0では何もしない)
    VRMUtils.rotateVRM0(vrm);
    VRMUtils.removeUnnecessaryVertices(vrm.scene);
    VRMUtils.removeUnnecessaryJoints(vrm.scene);
    vrm.scene.traverse((obj) => { obj.frustumCulled = false; });

    // モーションのlookAtトラック再生に必要
    const lookAtQuatProxy = new VRMLookAtQuaternionProxy(vrm.lookAt);
    lookAtQuatProxy.name = 'lookAtQuaternionProxy';
    vrm.scene.add(lookAtQuatProxy);

    if (mixer) {
      mixer.stopAllAction();
      mixer = null;
    }
    stopAnimationLoop();
    clearMotionAdvanceTimer();

    if (currentVrm) {
      scene.remove(currentVrm.scene);
      disposeObject3D(currentVrm.scene);
    }

    scene.add(vrm.scene);
    currentVrm = vrm;

    statusEl.textContent = 'レンダリング中...';
    rotationY = 0;
    renderAllViews();
    drawComposite();
    resetZoom();

    placeholder.style.display = 'none';
    compositeCanvas.style.display = 'block';
    downloadBtn.disabled = false;

    if (motionList.length) {
      // 既存のモーションリストがあれば、新しいモデルに合わせてリターゲットして引き続き再生する
      if (motionListPlaying && currentMotionId) {
        const idx = currentMotionIndex();
        if (idx !== -1) playMotionAtIndex(idx);
      } else {
        renderMotionList();
      }
      statusEl.textContent = `読み込み完了: ${file.name}(モーション${motionList.length}件)`;
    } else {
      statusEl.textContent = `読み込み完了: ${file.name}`;
    }
    log('読み込み・レンダリング完了');
  } catch (err) {
    log('VRM読み込みエラー: ' + (err && err.message ? err.message : err), true);
    statusEl.textContent = '読み込みに失敗しました。診断ログを確認してください。';
  } finally {
    URL.revokeObjectURL(url);
  }
}

function getModelBounds(object3d) {
  const box = new THREE.Box3().setFromObject(object3d);
  const size = new THREE.Vector3();
  box.getSize(size);
  const center = new THREE.Vector3();
  box.getCenter(center);
  return { size, center };
}

// azimuth: モデルの周りをY軸中心に回るカメラ角度(ラジアン)
// VRMUtils.rotateVRM0()でVRM0/VRM1いずれのモデルも+Z方向を向くよう統一しているため、azimuth=0を正面として扱う
// renderAllViews側で呼び出し時にazimuthへrotationY(体軸回転オフセット)を加算している
function renderView(azimuth, size, bounds) {
  const { center, size: dims } = bounds;
  const maxHeight = dims.y;
  const maxHoriz = Math.max(dims.x, dims.z);
  const half = ((Math.max(maxHeight, maxHoriz) / 2) * 1.15) / viewZoom; // 余白15%、viewZoomで拡大

  camera.left = -half;
  camera.right = half;
  camera.top = half;
  camera.bottom = -half;
  camera.near = 0.01;
  camera.far = 100;

  const dist = Math.max(maxHeight, maxHoriz) * 2 + 2;
  camera.position.set(
    center.x + dist * Math.sin(azimuth),
    center.y,
    center.z + dist * Math.cos(azimuth)
  );
  camera.lookAt(center);
  camera.up.set(0, 1, 0);
  camera.updateProjectionMatrix();

  renderer.setSize(size, size, false);
  renderer.render(scene, camera);

  const out = document.createElement('canvas');
  out.width = size;
  out.height = size;
  out.getContext('2d').drawImage(renderer.domElement, 0, 0, size, size);
  return out;
}

function renderAllViews() {
  if (!currentVrm) return;
  const bounds = getModelBounds(currentVrm.scene);

  renderedViews = {
    front: renderView(0 + rotationY, cellSize, bounds),             // 上段のソース(正面)
    back:  renderView(Math.PI + rotationY, cellSize, bounds),        // 下段のソース(背面)
    right: renderView(Math.PI / 2 + rotationY, cellSize, bounds),    // 左列のソース
    left:  renderView(-Math.PI / 2 + rotationY, cellSize, bounds),   // 右列のソース
  };
}

function drawComposite() {
  if (!renderedViews) return;

  const S = cellSize;
  const armDistance = S * armRatio;
  const half = armDistance + S / 2; // 中心から画像外端までの距離
  const canvasSize = Math.max(S, Math.round(half * 2));
  compositeCanvas.width = canvasSize;
  compositeCanvas.height = canvasSize;
  compositeCtx.fillStyle = '#000';
  compositeCtx.fillRect(0, 0, compositeCanvas.width, compositeCanvas.height);

  const centerX = canvasSize / 2;
  const centerY = canvasSize / 2;

  const deg = (d) => (d * Math.PI) / 180;
  const feetCenter = mode === 'feet';

  // 足中心: 各図の足側が十字の中心を向く / 頭中心: 頭側が中心を向く
  const rot = feetCenter
    ? { top: 0, bottom: deg(180), left: deg(270), right: deg(90) }
    : { top: deg(180), bottom: 0, left: deg(90), right: deg(270) };

  const slots = [
    { img: renderedViews.back,  cx: centerX, cy: centerY - armDistance, angle: rot.top,    side: 'top' },
    { img: renderedViews.front, cx: centerX, cy: centerY + armDistance, angle: rot.bottom, side: 'bottom' },
    { img: renderedViews.right, cx: centerX - armDistance, cy: centerY, angle: rot.left,   side: 'left' },
    { img: renderedViews.left,  cx: centerX + armDistance, cy: centerY, angle: rot.right,  side: 'right' },
  ];

  for (const slot of slots) {
    compositeCtx.save();
    // 中心軸(centerX/centerY)を越えた部分は表示しない(距離がマイナスになっても反対側へはみ出させない)
    compositeCtx.beginPath();
    switch (slot.side) {
      case 'top':    compositeCtx.rect(0, 0, canvasSize, centerY); break;
      case 'bottom': compositeCtx.rect(0, centerY, canvasSize, canvasSize - centerY); break;
      case 'left':   compositeCtx.rect(0, 0, centerX, canvasSize); break;
      case 'right':  compositeCtx.rect(centerX, 0, canvasSize - centerX, canvasSize); break;
    }
    compositeCtx.clip();

    compositeCtx.translate(slot.cx, slot.cy);
    compositeCtx.rotate(slot.angle);
    compositeCtx.drawImage(slot.img, -S / 2, -S / 2, S, S);
    compositeCtx.restore();
  }
}

vrmInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadVrm(file);
});

vrmaInput.addEventListener('change', (e) => {
  const files = [...e.target.files];
  if (files.length) loadVrmaFiles(files);
  vrmaInput.value = ''; // 同じファイルを続けて選択できるようにリセット
});

motionPlayPauseBtn.addEventListener('click', () => {
  if (motionListPlaying) {
    stopMotionPlayback();
  } else {
    startMotionPlayback();
  }
});

playModeRadios.forEach((radio) => {
  radio.addEventListener('change', (e) => {
    if (e.target.checked) motionPlayMode = e.target.value;
    if (motionListPlaying) scheduleNextAdvance();
  });
});

motionIntervalInput.addEventListener('change', () => {
  const v = parseFloat(motionIntervalInput.value);
  motionIntervalSeconds = (!isFinite(v) || v <= 0) ? 5 : v;
  motionIntervalInput.value = motionIntervalSeconds;
  if (motionListPlaying) scheduleNextAdvance();
});

centerSwitch.addEventListener('click', () => {
  mode = mode === 'feet' ? 'head' : 'feet';
  centerSwitch.classList.toggle('on', mode === 'head');
  labelFeet.classList.toggle('label-active', mode === 'feet');
  labelHead.classList.toggle('label-active', mode === 'head');
  drawComposite();
});

cellSizeSelect.addEventListener('change', () => {
  cellSize = parseInt(cellSizeSelect.value, 10);
  if (currentVrm) {
    renderAllViews();
    drawComposite();
  }
});

downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `vrm_cross_${mode === 'feet' ? '足中心' : '頭中心'}.png`;
  link.href = compositeCanvas.toDataURL('image/png');
  link.click();
});

init();
</script>
